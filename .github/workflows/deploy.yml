name: Deploy

# Continuous deployment to the homelab Debian server.
#
# SECURITY (this repo is PUBLIC):
#   * Triggers are restricted to `push` to main and manual dispatch.
#   * `pull_request` / `pull_request_target` are deliberately NOT triggers, so
#     untrusted fork code can NEVER reach the self-hosted runner. Do not add
#     them.
#   * The self-hosted `deploy` job only runs after the GitHub-hosted `test`
#     job passes, and only for refs/heads/main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Never let two deploys run at once; never cancel a deploy mid-restart.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  # --- Gate: run the full test + build on a clean GitHub-hosted runner ------
  test:
    name: Test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Run pytest
        working-directory: backend
        run: pytest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # --- Deploy: on the homelab server, only after the gate is green ----------
  deploy:
    name: Deploy to homelab
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, tradingbot]
    steps:
      # No actions/checkout here: the deploy script operates directly on the
      # live working tree at $TRADINGBOT_ROOT (it fetches + resets itself).
      - name: Deploy, health-check, auto-rollback on failure
        run: /opt/tradingbot/deploy/deploy.sh
        env:
          TRADINGBOT_ROOT: /opt/tradingbot
          DEPLOY_REF: ${{ github.sha }}
