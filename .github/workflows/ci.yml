name: CI

# Quality gate for pull requests and feature branches. Runs ONLY on
# GitHub-hosted runners — it never touches the self-hosted homelab runner and
# never sees any secret, so it is safe to run on untrusted fork PRs.
#
# Pushes to `main` are intentionally excluded here: they are handled by
# deploy.yml, which runs the same tests as a gate before deploying.
on:
  pull_request:
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Run pytest
        working-directory: backend
        run: pytest

  frontend:
    name: Frontend build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build
        working-directory: frontend
        run: npm run build
