# TradingBot Configuration (base layer)
# This file is validated on server startup. Unknown keys are rejected, so keep
# options you are not using COMMENTED OUT. Values shown commented are the
# built-in defaults; uncomment only to override.
#
# This is the LOWEST-precedence layer. Configuration is merged in order:
#   1. this file (config.yaml)
#   2. profile file config.<name>.yaml   (selected via TRADINGBOT_PROFILE)
#   3. environment files                 (TRADINGBOT_ENV_FILE, deploy/tradingbot.env)
#   4. process environment variables     (TRADINGBOT__SECTION__KEY=value)
# Higher layers override lower ones. Put reproducible, non-secret overrides in a
# tracked profile file; put secrets in an (untracked) env file or the process
# environment. See CONFIGURATION.md for details.

server:
  # Loopback by default. To expose beyond this machine you MUST set an API
  # token (TRADINGBOT_API_TOKEN env var or api_token below) or the server
  # refuses to start.
  host: "127.0.0.1"
  port: 8000
  debug: false
  # api_token: ""  # prefer the TRADINGBOT_API_TOKEN environment variable
  # cors_origins:  # browser origins allowed to call the API (defaults to local dev)
  #   - "http://localhost:5173"
  # frontend_dist:  # OPTIONAL override for the web UI build location.
  #   The built web UI is auto-discovered at ../frontend/dist by default and
  #   served from the API origin — you do NOT need to set this. Set it only to
  #   serve a build from a non-default path.

database:
  # Relative SQLite paths are anchored to the backend directory automatically,
  # so the DB location is stable regardless of the process working directory.
  url: "sqlite+aiosqlite:///./tradingbot.db"

market_data:
  # Source for the dashboard's live price + indicators. Does NOT affect trading:
  # the engine always reads its own REST tickers.
  #   rest      (default) poll fetch_ticker. Works everywhere REST works; MEXC
  #             blocks its public WEBSOCKET streams from many IPs/regions.
  #   websocket native MEXC stream connector (richer orderbook/volume data) -
  #             only where MEXC permits streams from this host's IP.
  # source: "rest"
  # rest_poll_interval_seconds: 2.0

trading:
  # Default values for bot execution
  execution_interval_seconds: 1
  pnl_snapshot_interval_seconds: 300

  # Risk management defaults
  default_stop_loss_percent: 10.0
  default_daily_loss_limit: 500.0

  # --- Reliability / operability (defaults shown; uncomment to override) ---
  # reconciliation_interval_seconds: 300   # live balance reconciliation cadence
  # max_consecutive_failures: 10           # loop errors before a bot is paused + alerted
  # failure_backoff_max_seconds: 60        # cap on exponential backoff between failures
  # state_checkpoint_seconds: 60           # how often strategy/sim state is persisted in-loop
  # backup_interval_seconds: 3600          # periodic SQLite backup cadence
  # ticker_cache_ttl_seconds: 2.0          # shared dry-run ticker cache TTL (raise for many bots)

exchange:
  # Exchange API configuration (LIVE trading only; not needed for dry run).
  # Prefer MEXC_API_KEY / MEXC_API_SECRET environment variables.
  api_key: ""
  api_secret: ""
  sandbox_mode: true

email:
  enabled: false
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_password: ""
  from_address: ""
  to_address: ""

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
